<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anjia Yang | Academic Homepage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta
    name="description"
    content="Anjia Yang's academic homepage at Jinan University, featuring publications, students, research projects, and professional activities in security, privacy, and blockchain."
  >
  <meta
    name="keywords"
    content="Anjia Yang, Jinan University, cyber security, IoT security, cryptography, blockchain, academic homepage"
  >
  <meta name="author" content="Anjia Yang">
  <meta name="robots" content="index, follow">

  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

  <link
    rel="preload"
    href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  >
  <noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  </noscript>
  <link rel="stylesheet" href="public/css/styles.css">
  <link rel="stylesheet" href="public/css/beautify.css">
</head>

<body>
  <div class="progress-bar" id="progress-bar"></div>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Anjia Yang',
      homepage: 'docs/cv.md',
      loadNavbar: true,
      mergeNavbar: true,
      requestHeaders: {
        'cache-control': 'no-cache',
      },
      serviceWorker: false,
    }
  </script>

  <script src="public/js/publications.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@latest/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@latest/dist/docsify-copy-code.min.js"></script>
  <script src="public/js/docsify-scroll-to-top.js"></script>
  <script src="public/js/progress-bar.js"></script>
</body>
</html>
